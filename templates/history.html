{% extends "base.html" %}
{% block title %}Historial - Contador de Microalgas{% endblock %}
{% block content %}
<div class="row"><div class="col-lg-10 mx-auto"><div class="card"><div class="card-header"><h1 class="h3 mb-0"><i class="fas fa-history"></i> Historial de Conteos</h1></div><div class="card-body"><div class="mb-3"><label for="technician-filter" class="form-label">Filtrar por Técnico</label><input type="text" class="form-control" id="technician-filter" placeholder="Nombre del técnico"></div><div class="table-responsive"><table class="table table-striped"><thead><tr><th>Técnico</th><th>ID Imagen</th><th>Conteo</th><th>Tiempo (seg)</th><th>Fecha</th></tr></thead><tbody id="history-table-body"><tr><td colspan="5" class="text-center">Cargando...</td></tr></tbody></table></div></div></div></div></div>
<script>
async function loadHistory(){var technician=document.getElementById("technician-filter").value;var url=technician?"/api/technician-history/"+technician:"/api/all-history";try{var response=await fetch(url);var data=await response.json();var tbody=document.getElementById("history-table-body");if(data.success&&data.history&&data.history.length>0){tbody.innerHTML="";for(var i=0;i<data.history.length;i++){var session=data.history[i];for(var j=0;j<session.counts.length;j++){var count=session.counts[j];var row=tbody.insertRow();row.insertCell(0).textContent=session.technician||"N/A";row.insertCell(1).textContent=count.image_id;row.insertCell(2).textContent=count.count;row.insertCell(3).textContent=count.time?count.time.toFixed(1):"-";row.insertCell(4).textContent=new Date(session.date).toLocaleString();}}}else{tbody.innerHTML='<tr><td colspan="5" class="text-center">No hay registros</td></tr>';}}catch(error){document.getElementById("history-table-body").innerHTML='<tr><td colspan="5" class="text-center text-danger">Error cargando</td></tr>';}}
document.getElementById("technician-filter").addEventListener("input",function(){loadHistory();});loadHistory();
</script>
{% endblock %}
